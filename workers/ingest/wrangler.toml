name = "secop-ingest"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true            # /admin/backfill needs to be reachable; ADMIN_TOKEN gates it.

[triggers]
crons = ["0 */6 * * *"]

# Linode Object Storage (S3-compatible). Credentials go in via `wrangler secret put`
# as S3_ACCESS_KEY_ID + S3_SECRET_ACCESS_KEY. Endpoint/region/bucket are non-secret
# and live here so they show up in `wrangler deploy` output.
[vars]
S3_ENDPOINT = "https://us-southeast-1.linodeobjects.com"
S3_REGION   = "us-southeast-1"
S3_BUCKET   = "loca-bucket"

[observability]
enabled = true
